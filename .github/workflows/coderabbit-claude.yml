name: CodeRabbit → Claude Auto-Review

on:
  pull_request_review:
    types: [submitted]

jobs:
  trigger-claude:
    if: github.event.review.user.login == 'coderabbitai[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Tag Claude to apply CodeRabbit feedback
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `@claude CodeRabbit has finished its review on this PR. Please:\n1. Read the CodeRabbit review above\n2. Evaluate each suggestion — apply it only if it is correct, aligns with project conventions, and is not a false positive\n3. Apply applicable suggestions in a follow-up commit on this branch\n4. Re-run \`composer analyse\` and \`composer test\` — both must pass\n5. Push the commit\n\nIf no suggestions are applicable, reply with a brief explanation of what was skipped and why.`
            });
