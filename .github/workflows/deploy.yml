name: Build and Deploy Laravel Filament

on:
  workflow_run:
    workflows: ["Check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  laravel-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none

      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Rekomendasi untuk Tailwind v4 / Filament v4

      - name: 📦 Install NPM & Build Assets
        run: |
          npm install
          npm run build # Ini akan memproses Vite & Filament Custom Theme

      - name: 📂 Sync Files to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          exclude: |
            **/node_modules/**
            **/vendor/**
            **/.git*
            **/.git*/**
            .env
            .env.*
            /storage/*.key
            /storage/pail
            /public/hot
            /public/storage
            /auth.json
            /.phpunit.cache
            /.vscode
            /.idea
            **/*.log
            **/tests/**
            phpunit.xml
            README.md
